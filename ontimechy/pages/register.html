<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>ثبت‌نام | Ontimechy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../images/icons/icon3.jpg" type="image/x-icon" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="../index.html" class="auth-logo">Ontimechy</a>
      <a href="../index.html" class="auth-back">بازگشت به صفحه اصلی ›</a>

      <div class="auth-tabs">
        <a href="login.html">ورود</a>
        <span style="color:var(--text-dim);">/</span>
        <a href="register.html" class="is-active">ثبت‌نام</a>
      </div>
      <p class="auth-hint">سلام! خوش اومدی :)<br />برای ساخت حساب کاربری، شماره موبایل خود را وارد کنید.</p>

      <form action="#" method="POST">
        <div class="input-group">
          <label for="fullname">نام و نام خانوادگی</label>
          <input type="text" id="fullname" name="fullname" placeholder="نام و نام خانوادگی" required />
        </div>
        <div class="input-group">
          <label for="phone">شماره موبایل</label>
          <input type="text" id="phone" name="phone" placeholder="مثلاً 09121234567" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block">ثبت‌نام</button>
      </form>

      <div class="terms">
        با ثبت‌نام در آنتایمچی، <a href="#">قوانین و مقررات</a> و <a href="#">حریم خصوصی</a> را می‌پذیرید.
      </div>

      <div class="auth-footer">
        قبلاً ثبت‌نام کرده‌ای؟ <a href="login.html">وارد شو</a>
      </div>
    </div>
  </div>

</body>
</html>
