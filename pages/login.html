<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>ورود | Ontimechy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../images/icons/icon3.jpg" type="image/x-icon" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <a href="../index.html" class="auth-logo">Ontimechy</a>
      <a href="../index.html" class="auth-back">بازگشت به صفحه اصلی ›</a>

      <div class="auth-tabs">
        <a href="login.html" class="is-active">ورود</a>
        <span style="color:var(--text-dim);">/</span>
        <a href="register.html">ثبت‌نام</a>
      </div>
      <p class="auth-hint">سلام! خوش اومدی :)<br />لطفاً شماره موبایل خود را وارد کنید.</p>

      <form action="#" method="POST">
        <div class="input-group">
          <label for="phone">شماره موبایل</label>
          <input type="text" id="phone" name="phone" placeholder="مثلاً 09121234567" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block">ورود</button>
      </form>

      <div class="terms">
        با ورود به حساب کاربری، <a href="#">قوانین و مقررات</a> و <a href="#">حریم خصوصی</a> را می‌پذیرید.
      </div>

      <div class="auth-footer">
        حساب کاربری نداری؟ <a href="register.html">ثبت‌نام کن</a><br />
        رمز عبورت رو فراموش کردی؟ <a href="#">بازیابی رمز</a>
      </div>
    </div>
  </div>

</body>
</html>
